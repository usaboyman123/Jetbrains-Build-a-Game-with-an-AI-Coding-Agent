type: marketplace
title: Build a Game with an AI Coding Agent
language: English
summary: "<p>Build a 3D browser game step by step – with the help of an AI coding\
  \ agent.</p>\n<p>In this project-based course, you'll plan, build, and polish a\
  \ complete game inside WebStorm, using AI coding agents to turn ideas into working\
  \ code. \nFollow the story of Tode the Frog, or customize the visuals and make the\
  \ game your own. No grades – just hands-on building and your creativity.</p>"
programming_language: JavaScript
content:
  - Introduction
  - Skeleton
  - Core_loop
  - Visual
  - Conclusion
